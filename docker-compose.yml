services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: goal_edge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - goal_edge_pgdata:/var/lib/postgresql/data
  backend:
    build: ./backend
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/goal_edge
    ports:
      - "8000:8000"
    depends_on:
      - db
volumes:
  goal_edge_pgdata:
